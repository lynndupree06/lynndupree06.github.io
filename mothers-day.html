<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Hibachi Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #receipt-items::-webkit-scrollbar { width: 4px; }
        #receipt-items::-webkit-scrollbar-track { background: transparent; }
        #receipt-items::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .tip-btn.active { background-color: #991b1b; color: white; border-color: #991b1b; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-12">
    <div class="max-w-6xl mx-auto px-4 pt-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-red-800">Mother's Day Hibachi</h1>
            <p class="text-stone-600 mt-2 font-medium">1290 Flamingo Road • May 9th @ 6:00 PM</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Entry Form -->
            <div class="lg:col-span-7">
                <div class="bg-white rounded-2xl shadow-sm p-6 border border-stone-200">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4 border-b border-stone-100 pb-6">
                        <h2 class="text-xl font-bold text-stone-800 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            Order Details
                        </h2>
                        <div class="w-full md:w-64">
                            <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">Family Name</label>
                            <input type="text" id="family-name" placeholder="The Millers..." class="w-full p-2 bg-stone-50 border border-stone-200 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                        </div>
                    </div>
                    
                    <div id="guest-container" class="space-y-4">
                        <!-- Guest rows injected here -->
                    </div>

                    <button onclick="addGuest()" class="w-full mt-6 py-4 bg-stone-900 hover:bg-black text-white rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        Add Another Guest
                    </button>
                </div>
            </div>

            <!-- Right Column: Itemized Receipt -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-2xl shadow-xl p-8 border-t-8 border-red-700 sticky top-8">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-black uppercase tracking-widest text-stone-800">Itemized Receipt</h2>
                        <p class="text-stone-400 text-[10px] mt-1 italic uppercase tracking-tighter" id="receipt-date"></p>
                    </div>

                    <div id="receipt-items" class="space-y-6 mb-8 max-h-[350px] overflow-y-auto pr-2">
                        <!-- Items injected here -->
                    </div>

                    <div class="border-t border-stone-200 pt-6 space-y-4">
                        <div class="flex justify-between text-stone-600 text-sm">
                            <span>Subtotal</span>
                            <span id="food-subtotal">$0.00</span>
                        </div>
                        <div class="flex justify-between text-stone-600 text-sm">
                            <span>Sales Tax (8.25%)</span>
                            <span id="tax-display">$0.00</span>
                        </div>
                        
                        <!-- Updated Gratuity UI with 10, 15, 20 options -->
                        <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-stone-500 uppercase tracking-wider">Gratuity</span>
                                <span id="tip-display" class="font-bold text-stone-900">$0.00</span>
                            </div>
                            
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="setTipType('pct', 10)" id="tip-10" class="tip-btn py-2 text-xs font-bold rounded-lg border border-stone-200 bg-white hover:border-red-400 transition-all">10%</button>
                                <button onclick="setTipType('pct', 15)" id="tip-15" class="tip-btn py-2 text-xs font-bold rounded-lg border border-stone-200 bg-white hover:border-red-400 transition-all">15%</button>
                                <button onclick="setTipType('pct', 20)" id="tip-20" class="tip-btn active py-2 text-xs font-bold rounded-lg border border-stone-200 bg-white hover:border-red-400 transition-all">20%</button>
                                <button onclick="setTipType('custom')" id="tip-custom-btn" class="tip-btn py-2 text-xs font-bold rounded-lg border border-stone-200 bg-white hover:border-red-400 transition-all">Custom</button>
                            </div>

                            <div id="custom-tip-input-container" class="hidden animate-in fade-in zoom-in-95 duration-200">
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 font-bold">$</span>
                                    <input type="number" id="custom-tip-amount" value="0.00" step="1" oninput="calculate()" class="w-full pl-7 pr-3 py-2 bg-white border border-red-200 rounded-lg outline-none focus:ring-2 focus:ring-red-500 font-bold text-stone-800">
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-end pt-4 mt-2 border-t-2 border-stone-800">
                            <span class="font-black text-xl text-stone-800 uppercase text-xs md:text-sm">Total Owed</span>
                            <span id="grand-total" class="font-black text-3xl text-red-700">$0.00</span>
                        </div>
                    </div>

                    <!-- Submit RSVP Button -->
                    <button onclick="submitRSVP()" class="w-full mt-8 py-4 bg-red-700 hover:bg-red-800 text-white rounded-xl font-black uppercase tracking-widest shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        Submit RSVP
                    </button>

                    <div class="mt-4 pt-4 border-t border-dashed border-stone-300 text-center">
                        <p class="text-[10px] font-black text-red-800 uppercase tracking-[0.2em] mb-2">Zelle Payment Info</p>
                        <p class="text-sm font-bold text-stone-900 bg-stone-100 py-2 rounded border border-stone-200">kazembe72015@gmail.com</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TAX_RATE = 0.0825;
        const HOST_EMAIL = "[your-email@example.com]";

        let currentTipMode = 'pct'; // 'pct' or 'custom'
        let currentTipValue = 20;

        document.getElementById('receipt-date').innerText = new Date().toLocaleString();

        function setTipType(mode, value = 0) {
            currentTipMode = mode;
            currentTipValue = value;
            
            // UI Updates
            document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.remove('active'));
            const customInput = document.getElementById('custom-tip-input-container');
            
            if (mode === 'pct') {
                document.getElementById(`tip-${value}`).classList.add('active');
                customInput.classList.add('hidden');
            } else {
                document.getElementById('tip-custom-btn').classList.add('active');
                customInput.classList.remove('hidden');
            }
            
            calculate();
        }

        function addGuest() {
            const container = document.getElementById('guest-container');
            const guestId = `guest-${Date.now()}`;
            const div = document.createElement('div');
            div.id = guestId;
            div.className = "group p-5 bg-stone-50 rounded-xl border border-stone-200 relative transition-all hover:border-stone-400";
            
            div.innerHTML = `
                <button onclick="removeGuest('${guestId}')" class="absolute top-3 right-3 text-stone-300 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Guest Name</label>
                        <input type="text" placeholder="Enter name..." oninput="calculate()" class="guest-name w-full p-2 bg-white border border-stone-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Type</label>
                            <select onchange="calculate()" class="guest-type w-full p-2 bg-white border border-stone-200 rounded-lg outline-none">
                                <option value="55" data-label="Adult">Adult ($55)</option>
                                <option value="30" data-label="Child">Child ($30)</option>
                                <option value="0" data-label="Toddler">Toddler (Free)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Protein 1</label>
                            <select onchange="calculate()" class="protein-1 w-full p-2 bg-white border border-stone-200 rounded-lg outline-none">
                                <option value="0" data-label="Chicken">Chicken</option>
                                <option value="0" data-label="Steak">Steak</option>
                                <option value="0" data-label="Shrimp">Shrimp</option>
                                <option value="0" data-label="Salmon">Salmon</option>
                                <option value="5" data-label="Filet Mignon">Filet (+$5)</option>
                                <option value="10" data-label="Lobster Tail">Lobster (+$10)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Protein 2</label>
                            <select onchange="calculate()" class="protein-2 w-full p-2 bg-white border border-stone-200 rounded-lg outline-none">
                                <option value="0" data-label="Chicken">Chicken</option>
                                <option value="0" data-label="Steak">Steak</option>
                                <option value="0" data-label="Shrimp">Shrimp</option>
                                <option value="0" data-label="Salmon">Salmon</option>
                                <option value="5" data-label="Filet Mignon">Filet (+$5)</option>
                                <option value="10" data-label="Lobster Tail">Lobster (+$10)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-red-600 uppercase tracking-widest mb-1">Add'l (+$15)</label>
                            <select onchange="calculate()" class="extra-protein w-full p-2 bg-white border border-red-200 text-red-800 rounded-lg outline-none">
                                <option value="0" data-label="None">None</option>
                                <option value="15" data-label="Chicken">Chicken</option>
                                <option value="15" data-label="Steak">Steak</option>
                                <option value="15" data-label="Shrimp">Shrimp</option>
                                <option value="15" data-label="Salmon">Salmon</option>
                                <option value="20" data-label="Filet Mignon">Filet (+$20)</option>
                                <option value="25" data-label="Lobster Tail">Lobster (+$25)</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            calculate();
        }

        function removeGuest(id) {
            document.getElementById(id).remove();
            calculate();
        }

        function calculate() {
            let subtotal = 0;
            const receiptContainer = document.getElementById('receipt-items');
            receiptContainer.innerHTML = '';
            const guestRows = document.querySelectorAll('#guest-container > div');
            
            guestRows.forEach((row, index) => {
                const nameInput = row.querySelector('.guest-name');
                const name = nameInput.value.trim() || `Guest ${index + 1}`;
                const typeS = row.querySelector('.guest-type');
                const p1S = row.querySelector('.protein-1');
                const p2S = row.querySelector('.protein-2');
                const exS = row.querySelector('.extra-protein');

                const base = parseFloat(typeS.value);
                const p1 = parseFloat(p1S.value);
                const p2 = parseFloat(p2S.value);
                const ex = parseFloat(exS.value);
                
                const gTotal = base + p1 + p2 + ex;
                subtotal += gTotal;

                const itemEntry = document.createElement('div');
                itemEntry.className = "receipt-item";
                
                let details = `
                    <div class="flex justify-between items-end mb-1">
                        <span class="font-black text-stone-800 tracking-tight">${name.toUpperCase()}</span>
                        <span class="font-bold text-stone-900">$${gTotal.toFixed(2)}</span>
                    </div>
                    <div class="space-y-0.5 border-l-2 border-stone-100 pl-3 ml-1 text-[10px] text-stone-500 uppercase">
                        <div class="flex justify-between"><span>${typeS.options[typeS.selectedIndex].getAttribute('data-label')} Base</span><span>$${base.toFixed(2)}</span></div>
                        <div class="flex justify-between italic"><span>• ${p1S.options[p1S.selectedIndex].getAttribute('data-label')}</span><span>${p1 > 0 ? '+$' + p1.toFixed(2) : 'incl.'}</span></div>
                        <div class="flex justify-between italic"><span>• ${p2S.options[p2S.selectedIndex].getAttribute('data-label')}</span><span>${p2 > 0 ? '+$' + p2.toFixed(2) : 'incl.'}</span></div>`;

                if(ex > 0) details += `<div class="text-red-600 font-bold flex justify-between pt-1"><span>+ ADD'L ${exS.options[exS.selectedIndex].getAttribute('data-label')}</span><span>$${ex.toFixed(2)}</span></div>`;
                details += `</div>`;
                itemEntry.innerHTML = details;
                receiptContainer.appendChild(itemEntry);
            });

            const tax = subtotal * TAX_RATE;
            
            let tip = 0;
            if (currentTipMode === 'pct') {
                tip = subtotal * (currentTipValue / 100);
            } else {
                tip = parseFloat(document.getElementById('custom-tip-amount').value) || 0;
            }
            
            const grandTotal = subtotal + tax + tip;

            document.getElementById('food-subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax-display').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('tip-display').innerText = `$${tip.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `$${grandTotal.toFixed(2)}`;
        }

        function submitRSVP() {
            const familyName = document.getElementById('family-name').value.trim();
            if (!familyName) {
                alert("Please enter your Family Name first!");
                return;
            }

            let bodyText = `Family Name: ${familyName}\n`;
            bodyText += `Date Submitted: ${new Date().toLocaleString()}\n`;
            bodyText += `------------------------------------------\n\n`;

            const guestRows = document.querySelectorAll('#guest-container > div');
            guestRows.forEach((row, index) => {
                const name = row.querySelector('.guest-name').value.trim() || `Guest ${index + 1}`;
                const type = row.querySelector('.guest-type').options[row.querySelector('.guest-type').selectedIndex].text;
                const p1 = row.querySelector('.protein-1').options[row.querySelector('.protein-1').selectedIndex].text;
                const p2 = row.querySelector('.protein-2').options[row.querySelector('.protein-2').selectedIndex].text;
                const ex = row.querySelector('.extra-protein').options[row.querySelector('.extra-protein').selectedIndex].text;

                bodyText += `GUEST: ${name}\n`;
                bodyText += `- Type: ${type}\n`;
                bodyText += `- Protein 1: ${p1}\n`;
                bodyText += `- Protein 2: ${p2}\n`;
                if (ex !== "None") bodyText += `- Extra Protein: ${ex}\n`;
                bodyText += `\n`;
            });

            bodyText += `------------------------------------------\n`;
            bodyText += `Subtotal: ${document.getElementById('food-subtotal').innerText}\n`;
            bodyText += `Tax: ${document.getElementById('tax-display').innerText}\n`;
            bodyText += `Gratuity: ${document.getElementById('tip-display').innerText}\n`;
            bodyText += `TOTAL OWED: ${document.getElementById('grand-total').innerText}\n\n`;
            bodyText += `Please remember to Zelle this total to confirm!`;

            const subject = encodeURIComponent(`Hibachi RSVP - ${familyName} Family`);
            const body = encodeURIComponent(bodyText);
            window.location.href = `mailto:${HOST_EMAIL}?subject=${subject}&body=${body}`;
        }

        // window.onload = addGuest;
    </script>
</body>
</html>
